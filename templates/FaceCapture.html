
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>FIDO Cloud - Face Registration</title>
    <link rel="stylesheet" href="../static/assets/css/style-starter.css">
    <link href="//fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
      .camera-box { position:relative; display:inline-block; border-radius:12px; overflow:hidden; box-shadow:0 8px 32px rgba(0,0,0,0.25); }
      #video { display:block; width:480px; max-width:100%; background:#000; }
      #overlay { position:absolute; top:0; left:0; }
      .status-box { margin:16px auto; padding:12px 24px; border-radius:8px; max-width:480px; font-weight:500; }
      .status-loading { background:#fff3cd; color:#856404; border:1px solid #ffc107; }
      .status-ready   { background:#d4edda; color:#155724; border:1px solid #28a745; }
      .status-error   { background:#f8d7da; color:#721c24; border:1px solid #dc3545; }
      .status-success { background:#d1ecf1; color:#0c5460; border:1px solid #17a2b8; }
      .btn-capture { padding:12px 36px; font-size:16px; border-radius:8px; background:#28a745; color:#fff; border:none; cursor:pointer; margin:8px; }
      .btn-capture:disabled { background:#aaa; cursor:not-allowed; }
      .btn-save { padding:12px 36px; font-size:16px; border-radius:8px; background:#007bff; color:#fff; border:none; cursor:pointer; margin:8px; display:none; }
      .preview-box { margin:12px auto; max-width:320px; border-radius:8px; overflow:hidden; display:none; }
      .preview-box img { width:100%; }
    </style>
  </head>
  <body>

<section class="w3l-header-4 header-sticky">
  <header id="site-header" class="fixed-top">
    <div class="container">
      <nav class="navbar navbar-expand-lg navbar-dark stroke">
        <h1><a class="navbar-brand" href="/"><span class="fa fas fa-server"></span> FIDO Cloud Authentication</a></h1>
      </nav>
    </div>
  </header>
</section>

<script src="../static/assets/js/jquery-3.3.1.min.js"></script>
<script src="../static/assets/js/bootstrap.min.js"></script>

<section class="w3l-inner-banner-main" style="padding-top:100px;">
  <div class="about-inner about editContent">
    <div class="container">
      <div class="breadcrumbs-sub">
        <ul class="breadcrumbs-custom-path">
          <li class="right-side propClone"><a href="/" class="editContent">Home <span class="fa fa-angle-right"></span></a></li>
          <li>Face Registration</li>
        </ul>
      </div>
    </div>
  </div>
</section>

<section class="w3l-contact-info-main" id="contact" style="padding:40px 0;">
  <div class="container text-center">
    <h3 class="header-name" style="margin-bottom:8px;">📷 Face Registration</h3>
    <p style="color:#666; margin-bottom:20px;">Position your face in the camera and click <strong>Capture Face</strong></p>

    <div id="statusBox" class="status-box status-loading">⏳ Loading face recognition models, please wait...</div>

    <div class="camera-box" style="margin:0 auto; display:block; text-align:center;">
      <video id="video" autoplay muted playsinline></video>
      <canvas id="overlay"></canvas>
    </div>

    <div class="preview-box" id="previewBox">
      <p style="margin:8px 0; font-weight:600;">Captured Face:</p>
      <canvas id="previewCanvas" style="border-radius:8px; width:200px; height:200px;"></canvas>
    </div>

    <div style="margin-top:16px;">
      <button id="captureBtn" class="btn-capture" disabled>📸 Capture Face</button>
      <button id="saveBtn" class="btn-save">✅ Save & Continue</button>
    </div>
  </div>
</section>

<section class="w3l-footer-29-main">
  <div class="footer-29 py-4">
    <div class="container">
      <div class="bottom-copies text-center">
        <p class="copy-footer-29">© FIDO Cloud Authentication. All rights reserved.</p>
      </div>
    </div>
  </div>
</section>

<!-- face-api.js -->
<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

<script>
  const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights';
  const video     = document.getElementById('video');
  const overlay   = document.getElementById('overlay');
  const statusBox = document.getElementById('statusBox');
  const captureBtn= document.getElementById('captureBtn');
  const saveBtn   = document.getElementById('saveBtn');
  const previewBox= document.getElementById('previewBox');
  const previewCanvas = document.getElementById('previewCanvas');

  let capturedDescriptor = null;
  let capturedImageBase64 = null;
  let detectionInterval = null;

  function setStatus(msg, type) {
    statusBox.textContent = msg;
    statusBox.className = 'status-box status-' + type;
  }

  async function loadModels() {
    try {
      await Promise.all([
        faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
        faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
        faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL),
      ]);
      setStatus('✅ Models loaded. Starting camera...', 'ready');
      await startCamera();
    } catch (err) {
      setStatus('❌ Failed to load models: ' + err.message, 'error');
    }
  }

  async function startCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 480, height: 360 } });
      video.srcObject = stream;
      video.onloadedmetadata = () => {
        overlay.width  = video.videoWidth;
        overlay.height = video.videoHeight;
        startDetection();
        captureBtn.disabled = false;
        setStatus('✅ Camera ready. Position your face and click Capture.', 'ready');
      };
    } catch (err) {
      setStatus('❌ Camera access denied: ' + err.message, 'error');
    }
  }

  function startDetection() {
    const ctx = overlay.getContext('2d');
    detectionInterval = setInterval(async () => {
      const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
                              .withFaceLandmarks().withFaceDescriptor();
      ctx.clearRect(0, 0, overlay.width, overlay.height);
      if (detection) {
        const { x, y, width, height } = detection.detection.box;
        ctx.strokeStyle = '#28a745';
        ctx.lineWidth   = 3;
        ctx.strokeRect(x, y, width, height);
        ctx.fillStyle = 'rgba(40,167,69,0.15)';
        ctx.fillRect(x, y, width, height);
      }
    }, 200);
  }

  captureBtn.addEventListener('click', async () => {
    setStatus('🔍 Detecting face...', 'loading');
    captureBtn.disabled = true;
    const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
                            .withFaceLandmarks().withFaceDescriptor();
    if (!detection) {
      setStatus('⚠️ No face detected. Please look at the camera and try again.', 'error');
      captureBtn.disabled = false;
      return;
    }
    capturedDescriptor = Array.from(detection.descriptor);

    // Draw captured preview
    const pCtx = previewCanvas.getContext('2d');
    previewCanvas.width  = video.videoWidth;
    previewCanvas.height = video.videoHeight;
    pCtx.drawImage(video, 0, 0);
    capturedImageBase64 = previewCanvas.toDataURL('image/jpeg', 0.8);

    previewBox.style.display = 'block';
    saveBtn.style.display    = 'inline-block';
    captureBtn.textContent   = '🔄 Recapture';
    captureBtn.disabled      = false;
    setStatus('✅ Face captured! Click Save & Continue to register.', 'success');
  });

  saveBtn.addEventListener('click', async () => {
    if (!capturedDescriptor) return;
    saveBtn.disabled = true;
    setStatus('💾 Saving face data...', 'loading');
    try {
      const res = await fetch('/save-face', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ descriptor: capturedDescriptor, image: capturedImageBase64 })
      });
      const result = await res.json();
      if (result.success) {
        setStatus('🎉 Face registered successfully! Redirecting...', 'success');
        clearInterval(detectionInterval);
        setTimeout(() => { window.location.href = '/'; }, 1500);
      } else {
        setStatus('❌ ' + (result.message || 'Save failed.'), 'error');
        saveBtn.disabled = false;
      }
    } catch (err) {
      setStatus('❌ Network error: ' + err.message, 'error');
      saveBtn.disabled = false;
    }
  });

  loadModels();
</script>
</body>
</html>
